    /**
     * startQuizNow(moduleId)
     * Called when student clicks "Start Quiz" button on the intro screen.
     * Re-renders the current sub-module with quizState.introShown = true,
     * which causes renderQuizContent to skip the intro and show questions.
     *
     * @param {string} moduleId - The module ID (e.g. 'mod-1')
     */
    function startQuizNow(moduleId) {
      // Find the quiz sub-module for this module
      var mod = currentCourse.modules.find(function(m) { return m.moduleId === moduleId; });
      if (!mod) return;

      var quizSubModule = mod.subModules.find(function(sm) { return sm.type === 'quiz'; });
      if (!quizSubModule) return;

      // Mark intro as shown for THIS module, then re-render the content
      // (which will skip intro now that introShown[moduleId] is truthy)
      quizState.introShown[moduleId] = true;
      openSubModule(quizSubModule.subModuleId);
    }

    /**
     * renderQuizContent(container, subModule, module)
     * Renders a sequential one-question-at-a-time quiz for "quiz" type
     * sub-modules. Questions are loaded from QUIZ_QUESTIONS via
     * getQuizQuestions(). Each question is shown individually; the student
     * answers, gets immediate feedback (correct/incorrect + explanation),
     * then advances to the next question. After the final question a
     * full report card is displayed.
     *
     * @param {HTMLElement} container - The body element to render into.
     * @param {Object}      subModule - The sub-module definition object.
     * @param {Object}      module    - The parent module (contains quiz config).
     */
    function renderQuizContent(container, subModule, module) {
      // Check if this quiz was already completed — show retake prompt
      var existingResults = null;
      if (courseProgress && courseProgress.quizResults && courseProgress.quizResults[module.moduleId]) {
        existingResults = courseProgress.quizResults[module.moduleId];
      }
      if (existingResults) {
        container.innerHTML =
          '<div class="cv-quiz-result visible" style="background:var(--color-surface);border:1px solid var(--color-border);text-align:center;padding:var(--space-8);border-radius:var(--radius-lg);">' +
            '<div style="font-size:48px;margin-bottom:var(--space-3);">✅</div>' +
            '<div style="font-size:var(--text-lg);font-weight:var(--weight-bold);color:var(--color-ink);margin-bottom:var(--space-2);">' +
              __('cv_quiz_complete') +
            '</div>' +
            '<div style="font-size:var(--text-sm);color:var(--color-ink-muted);margin-bottom:var(--space-2);">' +
              __('cv_quiz_score', existingResults.score, existingResults.maxScore, Math.round(existingResults.percentage)) +
            '</div>' +
            '<div style="font-size:var(--text-xs);color:var(--color-ink-soft);margin-bottom:var(--space-5);">' +
              (existingResults.passed ? '✓ Passed' : 'Needs improvement') +
            '</div>' +
            '<div class="cv-quiz-actions" style="justify-content:center;margin-top:0;">' +
              '<button class="btn btn-primary" onclick="retakeQuiz(\'' + module.moduleId + '\', this)">' +
                __('cv_quiz_retake') +
              '</button>' +
            '</div>' +
          '</div>';
        quizState.active = false;
        return;
      }

      // Reset quiz state for this quiz
      quizState.active = true;
      quizState.answers = {};
      quizState.submitted = false;
      quizState.score = null;
      quizState.currentQuestion = 0;
      quizState.answered = false;
      if (!quizState.introShown[module.moduleId]) quizState.introShown[module.moduleId] = false;

      // Try to load questions. Quizzes are stored in the QUIZ_QUESTIONS
      // object keyed by moduleId (e.g. 'mod-1') or by course-specific keys.
      var questions = getQuizQuestions(currentCourse.courseId, module.moduleId);

      if (!questions || questions.length === 0) {
        container.innerHTML =
          '<div class="cv-placeholder">' +
            '<div class="cv-placeholder-icon">❓</div>' +
            '<h3>' + __('cv_quiz_not_available') + '</h3>' +
            '<p>' + __('cv_quiz_not_available_desc') + '</p>' +
          '</div>';
        quizState.active = false;
        return;
      }

      quizState.questions = questions;

      var passingScore = module.quiz ? module.quiz.passingScore : 80;

      // Show quiz intro screen if not yet shown for this module
      // Each module gets its own intro so the first quiz (mod-1) doesn't
      // consume the intro for mod-2, mod-3, etc.
      if (!quizState.introShown[module.moduleId]) {
        renderQuizIntro(container, module, questions, passingScore);
        quizState.introShown[module.moduleId] = true;
        return;
      }

      // Check if this module has AC reference content
      var moduleACs = null;
      if (typeof QUIZ_ACS !== 'undefined' &&
          QUIZ_ACS[currentCourse.courseId] &&
          QUIZ_ACS[currentCourse.courseId][module.moduleId]) {
        moduleACs = QUIZ_ACS[currentCourse.courseId][module.moduleId];
      }

      // Build the sequential quiz shell
      var html =
        // Intro banner
        '<div class="cv-quiz-intro" style="margin-bottom:var(--space-5);">' +
          '<p style="color:var(--color-ink-muted);font-size:var(--text-sm);">' +
            __('cv_quiz_intro', questions.length) +
          '</p>' +
        '</div>' +

        // Collapsible AC reference panel (only shown when ACs exist for this module)
        (moduleACs ? (
        '<div class="cv-ac-ref-panel" style="margin-bottom:var(--space-4);border:1px solid var(--color-border,#d0d0d0);border-radius:8px;overflow:hidden;">' +
          '<div class="cv-ac-ref-header" onclick="toggleQuizACRef()" ' +
            'style="padding:10px 14px;background:var(--color-surface-2,#f0f2f5);cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;">' +
            '<span style="font-size:16px;">📋</span>' +
            '<span style="font-weight:600;font-size:var(--text-sm,13px);flex:1;">View Acceptance Criteria</span>' +
            '<span id="cv-ac-ref-toggle" style="font-size:12px;transition:transform 0.2s;">▼</span>' +
          '</div>' +
          '<div id="cv-ac-ref-body" class="cv-ac-ref-body" style="display:none;padding:12px 16px;background:var(--color-surface,#fff);">' +
            moduleACs.map(function(ac, i) {
              return '<div style="margin-bottom:8px;font-size:var(--text-sm,13px);color:var(--color-ink-soft,#666);line-height:1.5;">' +
                (i + 1) + '. ' + escapeHtml(ac) +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>'
        ) : '') +

        // Progress indicator (updated by renderQuizQuestion)
        '<div class="cv-quiz-progress" id="cv-quiz-progress">' +
          __('cv_quiz_question_of', 1, questions.length) +
        '</div>' +

        // Single question card (filled by renderQuizQuestion)
        '<div class="cv-quiz-question" id="cv-quiz-question-card"></div>' +

        // Feedback panel — hidden until student answers
        '<div class="cv-quiz-feedback" id="cv-quiz-feedback">' +
          '<div class="cv-quiz-feedback-title" id="cv-quiz-feedback-title"></div>' +
          '<div class="cv-quiz-feedback-body" id="cv-quiz-feedback-body"></div>' +
        '</div>' +

        // Navigation: next-question button (hidden until answered)
        '<div class="cv-quiz-actions">' +
          '<button class="btn btn-primary" id="cv-quiz-next-btn" ' +
            'onclick="advanceQuiz()" style="display:none;">Next question →</button>' +
        '</div>';

      container.innerHTML = html;

      // Render the first question
      renderQuizQuestion(0);
    }

    /**
     * toggleQuizACRef()
     * Toggles the collapsible Acceptance Criteria reference panel
     * inside the quiz view. Called by onclick on the panel header.
     */
    function toggleQuizACRef() {
      var body = document.getElementById('cv-ac-ref-body');
      var toggle = document.getElementById('cv-ac-ref-toggle');
      if (!body || !toggle) return;
      var isVisible = body.style.display !== 'none';
      body.style.display = isVisible ? 'none' : 'block';
      toggle.style.transform = isVisible ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    /**
     * renderQuizQuestion(index)
     * Renders a single quiz question into the question card. Updates the
     * progress indicator and resets the feedback panel.
     *
     * @param {number} index - Zero-based index into quizState.questions.
     */
    function renderQuizQuestion(index) {
      var q = quizState.questions[index];

      // Update progress
      document.getElementById('cv-quiz-progress').textContent =
        __('cv_quiz_question_of', (index + 1), quizState.questions.length);

      // Build the question card HTML
      var card = document.getElementById('cv-quiz-question-card');
      var html =
        '<div class="cv-quiz-question-text">' +
          (index + 1) + '. ' + escapeHtml(q.questionText) +
        '</div>' +
        '<div class="cv-quiz-options" id="cv-quiz-options-' + q.questionId + '">';

      q.options.forEach(function(opt) {
        html +=
          '<div class="cv-quiz-option" data-value="' + escapeHtml(opt) + '" ' +
            'onclick="handleQuizAnswer(\'' + q.questionId + '\', this)">' +
            '<span>' + escapeHtml(opt) + '</span>' +
          '</div>';
      });

      html += '</div>';
      card.innerHTML = html;

      // Reset feedback panel
      var feedbackEl = document.getElementById('cv-quiz-feedback');
      feedbackEl.className = 'cv-quiz-feedback';

      // Hide next button
      document.getElementById('cv-quiz-next-btn').style.display = 'none';

      quizState.answered = false;
    }

    /**
     * handleQuizAnswer(questionId, optionEl)
     * Called when the student clicks an answer option. Records the answer,
     * highlights correct/incorrect options, and shows the feedback panel
     * with the correct answer and explanation. Enables the "Next question"
     * (or "See results") button.
     *
     * @param {string} questionId      - The question being answered.
     * @param {HTMLElement} optionEl   - The clicked option element.
     */
    function handleQuizAnswer(questionId, optionEl) {
      // Guard: already submitted or already answered this question
      if (quizState.submitted || quizState.answered) return;

      var q = quizState.questions[quizState.currentQuestion];
      var selectedValue = optionEl.getAttribute('data-value');
      var isCorrect = (selectedValue === q.correctAnswer);

      // Record the answer
      quizState.answers[questionId] = selectedValue;
      quizState.answered = true;

      // Disable further clicks and highlight correct/incorrect
      var options = optionEl.parentNode.querySelectorAll('.cv-quiz-option');
      options.forEach(function(opt) {
        opt.style.cursor = 'default';  // Remove pointer cursor
        var val = opt.getAttribute('data-value');
        if (val === q.correctAnswer) {
          opt.classList.add('correct');
        } else if (val === selectedValue && !isCorrect) {
          opt.classList.add('incorrect');
        }
      });

      // Show feedback panel
      var feedbackEl = document.getElementById('cv-quiz-feedback');
      feedbackEl.className = 'cv-quiz-feedback visible ' +
        (isCorrect ? 'feedback-correct' : 'feedback-incorrect');

      var titleEl = document.getElementById('cv-quiz-feedback-title');
      if (isCorrect) {
        titleEl.innerHTML = '✅ <strong>' + __('cv_quiz_correct') + '</strong>';
      } else {
        titleEl.innerHTML =
          '❌ <strong>' + __('cv_quiz_incorrect') + '</strong> ' +
          __('cv_quiz_correct_answer') + ' ' +
          '<span style="color:var(--color-success);font-weight:var(--weight-bold);">' +
            escapeHtml(q.correctAnswer) +
          '</span>';
      }

      document.getElementById('cv-quiz-feedback-body').textContent =
        q.explanation || '';

      // Show the next/see-results button
      var isLast = (quizState.currentQuestion === quizState.questions.length - 1);
      var nextBtn = document.getElementById('cv-quiz-next-btn');
      nextBtn.style.display = '';
      nextBtn.textContent = isLast ? __('cv_quiz_see_results') : __('cv_quiz_next');
    }

    /**
     * advanceQuiz()
     * Moves to the next question, or — if the last question was just
     * answered — calls submitQuiz() to grade and show the report card.
     */
    function advanceQuiz() {
      if (!quizState.answered) return;  // Student hasn't answered yet

      quizState.currentQuestion++;

      if (quizState.currentQuestion < quizState.questions.length) {
        renderQuizQuestion(quizState.currentQuestion);
      } else {
        submitQuiz();
      }
    }

    /**
     * submitQuiz()
     * Grades all answers, displays a report card (score, per-question
     * breakdown with explanations), and saves the results to IndexedDB.
     * If the student passes, marks the module as complete.
     */
    function submitQuiz() {
      if (quizState.submitted) return;

      quizState.submitted = true;

      var questions = quizState.questions;
      var maxScore = questions.length;
      var score = 0;

      // Grade every question from recorded answers
      var results = questions.map(function(q) {
        var studentAnswer = quizState.answers[q.questionId] || '';
        var isCorrect = (studentAnswer === q.correctAnswer);
        if (isCorrect) score++;
        return {
          questionId:    q.questionId,
          questionText:  q.questionText,
          studentAnswer: studentAnswer,
          correctAnswer: q.correctAnswer,
          isCorrect:     isCorrect,
          explanation:   q.explanation || ''
        };
      });

      var percentage = Math.round((score / maxScore) * 100);
      var passingScore = getModuleQuizPassingScore(getCurrentModule());
      var passed = percentage >= passingScore;

      quizState.score = {
        score:      score,
        maxScore:   maxScore,
        percentage: percentage,
        passed:     passed
      };

      // ── Build the report card HTML ────────────────────────────────────────
      var html = '';

      // Result banner — neutral, learning-focused. Score is recorded for the
      // audit trail but completion is not gated on a passing percentage.
      html +=
        '<div class="cv-quiz-result visible" ' +
          'style="background:var(--color-primary-light);' +
            'border:1px solid var(--color-border);' +
            'color:var(--color-ink);">' +
          '<div style="font-size:var(--text-2xl);font-weight:var(--weight-bold);">' +
            __('cv_quiz_complete') +
          '</div>' +
          '<div style="font-size:var(--text-lg);margin-top:var(--space-2);color:var(--color-ink-muted);">' +
            __('cv_quiz_score', score, maxScore, percentage) +
          '</div>' +
        '</div>';

      // Per-question breakdown
      html +=
        '<div class="cv-quiz-results-list" style="margin-top:var(--space-5);">';

      results.forEach(function(r, i) {
        var qNum = i + 1;
        html +=
          '<div class="cv-quiz-result-item" ' +
            'style="padding:var(--space-3) var(--space-4);' +
              'margin-bottom:var(--space-2);' +
              'background:var(--color-surface);' +
              'border-radius:var(--radius-md);' +
              'border:1px solid var(--color-border);' +
              'border-left:3px solid ' +
                (r.isCorrect ? 'var(--color-success)' : 'var(--color-error)') + ';">' +

            // Question text
            '<div style="font-weight:var(--weight-medium);margin-bottom:var(--space-1);">' +
              '<span style="color:' +
                (r.isCorrect ? 'var(--color-success)' : 'var(--color-error)') + ';">' +
                (r.isCorrect ? '✅' : '❌') +
              '</span> ' +
              'Q' + qNum + ': ' + escapeHtml(r.questionText) +
            '</div>';

        // Wrong-answer correction
        if (!r.isCorrect) {
          html +=
            '<div style="font-size:var(--text-sm);margin-top:var(--space-1);color:var(--color-ink-muted);">' +
              'Your answer: ' +
              '<span style="color:var(--color-error);text-decoration:line-through;">' +
                escapeHtml(r.studentAnswer) +
              '</span>' +
              ' &rarr; ' +
              '<span style="color:var(--color-success);font-weight:var(--weight-bold);">' +
                escapeHtml(r.correctAnswer) +
              '</span>' +
            '</div>';
        }

        // Explanation
        if (r.explanation) {
          html +=
            '<div style="font-size:var(--text-sm);color:var(--color-ink-muted);' +
              'font-style:italic;margin-top:var(--space-1);">' +
              escapeHtml(r.explanation) +
            '</div>';
        }

        html += '</div>';  // Close .cv-quiz-result-item
      });

      html += '</div>';  // Close .cv-quiz-results-list

      // Action buttons — render Reset Quiz now, add Continue AFTER save
      // to prevent a race condition where Continue is clicked before
      // quiz results are persisted and courseProgress is refreshed.
      html +=
        '<div class="cv-quiz-actions" style="margin-top:var(--space-5);justify-content:center;">' +
          '<button class="btn btn-secondary" onclick="resetQuiz()" ' +
            'style="font-size:var(--text-sm);">' + __('cv_quiz_reset_btn') + '</button>' +
          '<span id="cv-quiz-save-spinner" style="color:var(--color-ink-muted);font-size:var(--text-sm);">' +
            __('cv_saving') + '…</span>';

      html += '</div>';  // Close .cv-quiz-actions

      // Replace the container with the full report card
      var container = document.getElementById('cv-lesson-body');
      container.innerHTML = html;

      // ── Save results to IndexedDB ─────────────────────────────────────────
      var modId = getCurrentModuleId();
      if (modId) {
        saveCourseQuizResults(currentSession.caseId, COURSE_ID, modId, quizState.score)
          .then(function() {
            // Always mark the module complete — this is a learning app, not a
            // certification exam. Completing the quiz IS the requirement.
            // Score is saved above for the audit trail ("they took it, no excuses").
            return markModuleComplete(currentSession.caseId, COURSE_ID, modId);
          })
          .then(function() {
            // Award the certificate when the final exam is completed — no score gate.
            if (getCurrentSubModule().type === 'final-exam') {
              return awardCourseCertificate(currentSession.caseId, COURSE_ID);
            }
          })
          .then(function() {
            // If this was the final exam, redirect to the certificate page
            if (getCurrentSubModule().type === 'final-exam') {
              // Small delay to let the user see the score before redirecting
              setTimeout(function() {
                window.location.href = 'certificate.html?course=' + encodeURIComponent(COURSE_ID);
              }, 2500);
              return;  // Don't update display — we're redirecting
            }
            // Refresh local progress from IndexedDB before re-rendering
            return getCourseProgress(currentSession.caseId, COURSE_ID);
          })
          .then(function(freshProgress) {
            if (!freshProgress) return;  // Final exam redirect — don't update
            courseProgress = freshProgress;
            updateProgressDisplay();
            renderSidebar();  // Re-render to show updated status icons

            // ── Restore navigation buttons that were hidden during quiz ──
            var navEl = document.querySelector('.cv-lesson-nav');
            if (navEl) navEl.style.display = 'flex';

            // ── Now data is saved and progress is fresh — safe to show Continue ──
            var actionsEl = document.querySelector('.cv-quiz-actions');
            if (actionsEl) {
              // Remove the "Saving…" spinner
              var spinner = document.getElementById('cv-quiz-save-spinner');
              if (spinner) spinner.remove();

              // Add the Continue button now that data is consistent
              var continueBtn = document.createElement('button');
              continueBtn.className = 'btn btn-primary';
              continueBtn.style.fontSize = 'var(--text-sm)';
              continueBtn.textContent = __('cv_quiz_continue');
              continueBtn.addEventListener('click', function() {
                continueAfterQuiz();
              });
              actionsEl.appendChild(continueBtn);
            }
          })
          .catch(function(error) {
            console.error('Failed to save quiz results:', error);
            var spinner = document.getElementById('cv-quiz-save-spinner');
            if (spinner) {
              spinner.textContent = __('cv_error_save');
            }
          });
      }
    }

    /**
     * retakeQuiz(moduleId, btnEl)
     * Clears the stored quiz results for this module and re-renders the
     * quiz from scratch. Called from the "Retake" button on the completed
     * quiz prompt.
     */
    function retakeQuiz(moduleId, btnEl) {
      if (!confirm(__('cv_quiz_reset_confirm'))) return;
      btnEl.disabled = true;
      btnEl.textContent = __('cv_saving');

      // Clear saved quiz results for this module
      if (currentSession && courseProgress && courseProgress.quizResults) {
        delete courseProgress.quizResults[moduleId];
        if (typeof saveCourseQuizResults !== 'undefined') {
          saveCourseQuizResults(currentSession.caseId, COURSE_ID, moduleId, null)
            .then(function() {
              return getCourseProgress(currentSession.caseId, COURSE_ID);
            })
            .then(function(freshProgress) {
              if (freshProgress) courseProgress = freshProgress;
              // Re-navigate to this sub-module to show fresh quiz
              var entry = allSubModules.find(function(e) {
                return e.subModuleId === activeSubModule;
              });
              if (entry) openSubModule(entry.subModuleId);
            })
            .catch(function(error) {
              console.error('Failed to clear quiz results:', error);
              btnEl.disabled = false;
              btnEl.textContent = __('cv_quiz_retake');
            });
        } else {
          // Fallback: just re-render
          var entry = allSubModules.find(function(e) {
            return e.subModuleId === activeSubModule;
          });
          if (entry) openSubModule(entry.subModuleId);
        }
      } else {
        var entry = allSubModules.find(function(e) {
          return e.subModuleId === activeSubModule;
        });
        if (entry) openSubModule(entry.subModuleId);
      }
    }

    /**
     * resetQuiz()
     * Clears all quiz state and re-renders the quiz from scratch.
     * Allows the student to retake the quiz after reviewing their answers.
     */
    function resetQuiz() {
      if (!confirm(__('cv_quiz_reset_confirm'))) return;

      var container = document.getElementById('cv-lesson-body');
      if (!container) return;

      var entry = allSubModules.find(function(e) { return e.subModuleId === activeSubModule; });
      if (!entry || !entry.data) return;

      // Find the module that contains this sub-module
      var mod = currentCourse.modules[entry.moduleIndex];
      if (!mod) return;

      // Re-render the quiz with fresh state
      renderQuizContent(container, entry.data, mod);
    }

    /**
     * continueAfterQuiz()
     * Navigates forward from a completed quiz to the next unlocked
     * sub-module. If there is no next sub-module (course complete),
     * returns to the portal.
     */
    function continueAfterQuiz() {
      if (!activeSubModule) return;

      var currentIdx = allSubModules.findIndex(function(sm) {
        return sm.subModuleId === activeSubModule;
      });
      if (currentIdx === -1 || currentIdx >= allSubModules.length - 1) {
        goBackToPortal();
        return;
      }

      // Navigate to the next sub-module in the flat list
      var next = allSubModules[currentIdx + 1];
      var mod = currentCourse.modules[next.moduleIndex];

      // If the next sub-module is locked (e.g. across a module boundary),
      // go back to portal instead so the student can see their progress
      if (isSubModuleLocked(next.subModuleId, mod, next.moduleIndex)) {
        goBackToPortal();
        return;
      }

      openSubModule(next.subModuleId);
    }


    // ── SECTION 7: COMPLETION TRACKING ────────────────────────────────────────

    /**
     * completeCourseFromCapstone()
     * Called when the student clicks "Complete Course →" on a capstone overview page.
     * Marks all remaining sub-modules in the current (last) module as complete,
     * awards the course certificate, auto-enrolls in the next prerequisite course,
     * and redirects to the certificate page.
     */
    window.completeCourseFromCapstone = function() {
      if (!activeSubModule || !currentCourse) return;

      // Disable button to prevent double-click
      var btn = document.querySelector('.cv-module-overview .btn-primary');
      if (btn) { btn.disabled = true; btn.textContent = 'Completing…'; }

      // Get the last module
      var lastMod = currentCourse.modules[currentCourse.modules.length - 1];
      if (!lastMod) return;

      // Find all non-quiz sub-modules in the last module that need to be marked complete
      var subsToMark = lastMod.subModules.filter(function(sm) {
        return sm.type !== 'quiz' && sm.type !== 'final-exam' && !isSubModuleComplete(sm.subModuleId);
      });

      if (subsToMark.length === 0) {
        // Already complete — just go to certificate
        awardCourseCertificate(currentSession.caseId, COURSE_ID).then(function() {
          var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
          window.location.href = certUrl;
        });
        return;
      }

      // Mark each sub-module complete, then handle finalisation
      var promiseChain = Promise.resolve();
      subsToMark.forEach(function(sm) {
        promiseChain = promiseChain.then(function() {
          return markSubModuleComplete(currentSession.caseId, COURSE_ID, sm.subModuleId);
        });
      });

      promiseChain
        .then(function() {
          return getCourseProgress(currentSession.caseId, COURSE_ID);
        })
        .then(function(updated) {
          courseProgress = updated;

          // Mark the module complete
          return markModuleComplete(currentSession.caseId, COURSE_ID, lastMod.moduleId);
        })
        .then(function() {
          // Award certificate
          return awardCourseCertificate(currentSession.caseId, COURSE_ID);
        })
        .then(function() {
          // Find the next course that requires this course as a prerequisite
          var nextCourse = null;
          if (typeof COURSE_DEFINITIONS !== 'undefined' && COURSE_DEFINITIONS.length > 0) {
            for (var ci = 0; ci < COURSE_DEFINITIONS.length; ci++) {
              if (COURSE_DEFINITIONS[ci].prerequisiteId === COURSE_ID) {
                nextCourse = COURSE_DEFINITIONS[ci];
                break;
              }
            }
          }

          // If there's a next course, auto-enroll the student
          if (nextCourse && typeof enrollStudent === 'function') {
            return enrollStudent(currentSession.caseId, nextCourse.courseId).then(function() {
              showToast('🎉 Great work! You\'ve been enrolled in ' + nextCourse.title, 'success');
              // Show toast briefly then redirect to certificate
              setTimeout(function() {
                var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
                window.location.href = certUrl;
              }, 1500);
            }).catch(function() {
              // Fall back to certificate
              var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
              window.location.href = certUrl;
            });
          } else {
            // No next course, show certificate
            var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
            window.location.href = certUrl;
          }
        })
        .catch(function(error) {
          console.error('Failed to complete course from capstone:', error);
          showToast('Error completing course. Please try again.', 'error');
          if (btn) { btn.disabled = false; btn.textContent = 'Complete Course →'; }
        });
    };

    /**
     * markCurrentComplete()
     * Marks the currently active sub-module as complete, updates progress
     * displays, then automatically navigates forward to the next
     * sub-module (or shows a completion toast if this was the last one).
     * Quizzes are excluded — they have their own submit flow.
     */
    function markCurrentComplete() {
      if (!activeSubModule) return;

      var entry = allSubModules.find(function(sm) { return sm.subModuleId === activeSubModule; });
      if (!entry) return;

      var sm = entry.data;
      if (sm.type === 'quiz' || sm.type === 'final-exam') return;  // Quiz has its own flow

      // Prevent double-click
      var btn = document.getElementById('cv-complete-btn');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = __('cv_saving');

      // Find which module contains this sub-module (for later checks)
      var containingModuleId = null;
      for (var mi = 0; mi < currentCourse.modules.length; mi++) {
        var m = currentCourse.modules[mi];
        for (var si = 0; si < m.subModules.length; si++) {
          if (m.subModules[si].subModuleId === activeSubModule) {
            containingModuleId = m.moduleId;
            break;
          }
        }
        if (containingModuleId) break;
      }

      var isLastModule = containingModuleId && currentCourse.modules[currentCourse.modules.length - 1].moduleId === containingModuleId;

      markSubModuleComplete(currentSession.caseId, COURSE_ID, activeSubModule)
        .then(function() {
          return getCourseProgress(currentSession.caseId, COURSE_ID);
        })
        .then(function(updated) {
          courseProgress = updated;

          renderSidebar();
          updateProgressDisplay();

          // If all sub-modules in this module are now complete, mark module complete
          if (containingModuleId) {
            var containingMod = null;
            for (var i = 0; i < currentCourse.modules.length; i++) {
              if (currentCourse.modules[i].moduleId === containingModuleId) {
                containingMod = currentCourse.modules[i];
                break;
              }
            }
            if (containingMod) {
              var allSubsDone = containingMod.subModules.every(function(sm) {
                if (sm.type === 'quiz' || sm.type === 'final-exam') return true; // Skip quizzes for module completion
                return isSubModuleComplete(sm.subModuleId);
              });
              if (allSubsDone) {
                markModuleComplete(currentSession.caseId, COURSE_ID, containingModuleId);
              }
            }
          }

          // If last module completed, award certificate and auto-enroll in next prerequisite course
          if (isLastModule) {
            // Use a brief delay so the progress bar updates before redirect
            setTimeout(function() {
              awardCourseCertificate(currentSession.caseId, COURSE_ID).then(function() {
                // Find the next course that requires this course as a prerequisite
                var nextCourse = null;
                if (typeof COURSE_DEFINITIONS !== 'undefined' && COURSE_DEFINITIONS.length > 0) {
                  for (var ci = 0; ci < COURSE_DEFINITIONS.length; ci++) {
                    if (COURSE_DEFINITIONS[ci].prerequisiteId === COURSE_ID) {
                      nextCourse = COURSE_DEFINITIONS[ci];
                      break;
                    }
                  }
                }

                // If there's a next course, auto-enroll the student
                if (nextCourse && typeof enrollStudent === 'function') {
                  return enrollStudent(currentSession.caseId, nextCourse.courseId).then(function() {
                    // Show success message with next course name
                    showToast('🎉 Great work! You\'ve been enrolled in ' + nextCourse.title, 'success');
                    // Navigate to next course (capstone courses go to capstone-2.html, others to course-view.html)
                    var targetPage = nextCourse.isCapstone ? 'capstone-2.html' : 'course-view.html';
                    setTimeout(function() {
                      window.location.href = targetPage + '?courseId=' + encodeURIComponent(nextCourse.courseId) + '&confetti=true';
                    }, 1500);
                  }).catch(function(err) {
                    console.error('Auto-enrollment failed:', err);
                    // Fall back to certificate if enrollment fails
                    var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
                    window.location.href = certUrl;
                  });
                } else {
                  // No next course, show certificate
                  var certUrl = 'certificate.html?courseId=' + encodeURIComponent(COURSE_ID) + '&confetti=true';
                  window.location.href = certUrl;
                }
              });
            }, 500);
            return;
          }

          // Find the next sub-module in the flat list
          var currentIdx = allSubModules.indexOf(entry);

          // Navigate forward if there is a next unlocked sub-module
          if (currentIdx >= 0 && currentIdx < allSubModules.length - 1) {
            var nextEntry = allSubModules[currentIdx + 1];
            var nextMod = currentCourse.modules[nextEntry.moduleIndex];
            if (!isSubModuleLocked(nextEntry.subModuleId, nextMod, nextEntry.moduleIndex)) {
              openSubModule(nextEntry.subModuleId);
              return;
            }
          }

          // No next sub-module — show completion state
          btn.textContent = __('cv_completed');
          showToast(__('cv_course_complete'), 'success');
        })
        .catch(function(error) {
          console.error('Failed to mark complete:', error);
          showToast(__('cv_error_save'), 'error');
          btn.disabled = false;
          btn.textContent = __('cv_mark_complete');
        });
    }

    /**
     * handleExternalModuleComplete(subModuleId)
     * Called when a lab page (e.g. capstone-lab.html) sends MARK_MODULE_COMPLETE
     * via postMessage. Marks the entire containing module as complete.
     * This bridges standalone lab pages back into course progress tracking.
     *
     * @param {string} subModuleId - The sub-module ID that was completed (e.g. 'capstone').
     */
    function handleExternalModuleComplete(subModuleId) {
      if (!currentSession || !currentCourse || !COURSE_ID) return;

      // Find the module containing this sub-module
      var targetModule = null;
      var targetModuleId = null;
      for (var m = 0; m < currentCourse.modules.length; m++) {
        var mod = currentCourse.modules[m];
        for (var s = 0; s < mod.subModules.length; s++) {
          if (mod.subModules[s].subModuleId === subModuleId) {
            targetModule = mod;
            targetModuleId = mod.moduleId;
            break;
          }
        }
        if (targetModule) break;
      }
      if (!targetModule || !targetModuleId) {
        console.warn('handleExternalModuleComplete: module not found for', subModuleId);
        return;
      }

      // Mark every sub-module in this module as complete
      var promises = [];
      for (var s = 0; s < targetModule.subModules.length; s++) {
        var smId = targetModule.subModules[s].subModuleId;
        if (!isSubModuleComplete(smId)) {
          promises.push(markSubModuleComplete(currentSession.caseId, COURSE_ID, smId));
        }
      }

      // Mark the module itself complete
      promises.push(markModuleComplete(currentSession.caseId, COURSE_ID, targetModuleId));

      // Record bypass event if this was a bypass (for admin dashboard visibility)
      if (window.__bypassPending) {
        promises.push(getCourseProgress(currentSession.caseId, COURSE_ID).then(function(cp) {
          if (cp) {
            cp.bypassed = true;
            cp.bypassDate = new Date().toISOString();
            return saveCourseProgress(currentSession.caseId, COURSE_ID, cp);
          }
        }));
        window.__bypassPending = false;
      }

      // Award certificate if this is the final module
      var isLastModule = currentCourse.modules[currentCourse.modules.length - 1].moduleId === targetModuleId;
      if (isLastModule) {
        promises.push(awardCourseCertificate(currentSession.caseId, COURSE_ID));
      }

      Promise.all(promises)
        .then(function() {
          return getCourseProgress(currentSession.caseId, COURSE_ID);
        })
        .then(function(updated) {
          courseProgress = updated;
          updateProgressDisplay();
          renderSidebar();
          showToast(__('cv_course_complete'), 'success');
        })
        .catch(function(err) {
          console.error('handleExternalModuleComplete: save failed', err);
          showToast(__('cv_error_save'), 'error');
        });
    }

    /**
     * updateProgressDisplay()
     * Recalculates the overall course progress and updates the topbar bar + text.
     */
    function updateProgressDisplay() {
      var total = 0;
      var done = 0;

      if (courseProgress && currentCourse) {
        currentCourse.modules.forEach(function(mod) {
          mod.subModules.forEach(function(sm) {
            if (sm.type !== 'quiz' && sm.type !== 'final-exam') {
              total++;
              if (isSubModuleComplete(sm.subModuleId)) done++;
            }
          });
        });
      }

      var pct = total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;
      document.getElementById('cv-progress-text').textContent = __('cv_percent_done', pct);
      var bar = document.getElementById('cv-progress-bar');
      bar.style.width = pct + '%';
      if (pct >= 100) bar.classList.add('complete');
    }


    // ── SECTION 8: STATE HELPERS ─────────────────────────────────────────────

    /**
     * isSubModuleComplete(subModuleId)
     * Checks if a sub-module has been marked complete in the student's progress.
     *
     * @param {string} subModuleId - e.g. 'mod-1-1'
     * @returns {boolean} True if the sub-module is in the completed list.
     */
    function isSubModuleComplete(subModuleId) {
      if (!courseProgress || !courseProgress.subModulesComplete) return false;
      return courseProgress.subModulesComplete.indexOf(subModuleId) !== -1;
    }

    /**
     * isSubModuleLocked(subModuleId, module, moduleIndex)
     * A sub-module is locked if all sub-modules in the previous module
     * are NOT yet complete (i.e., you must finish module N before module N+1).
     *
     * @param {string} subModuleId - The sub-module to check.
     * @param {Object} module      - The module this sub-module belongs to.
     * @param {number} moduleIndex - Index of this module.
     * @returns {boolean} True if the sub-module should be locked.
     */
    function isSubModuleLocked(subModuleId, module, moduleIndex) {
      if (moduleIndex === 0) return false;  // First module is always unlocked

      var prevModule = currentCourse.modules[moduleIndex - 1];
      if (!prevModule) return false;

      // Previous module is complete only if ALL its sub-modules are done
      // (excluding quizzes — quizzes are graded separately)
      return !areAllSubModulesComplete(prevModule);
    }

    /**
     * areAllSubModulesComplete(module)
     * Checks if all non-quiz sub-modules in a module are marked complete.
     * NOTE: Fast path — if the module is marked complete in modulesComplete[],
     * return true immediately (this is set by markModuleComplete() after quiz).
     *
     * @param {Object} module - A module definition object.
     * @returns {boolean} True if every reading/exercise sub-module is done.
     */
    function areAllSubModulesComplete(module) {
      if (!courseProgress) return false;

      // Fast path: if the module itself is already marked complete, it's done
      // (This is set by markModuleComplete() after quiz submission)
      if (courseProgress.modulesComplete && courseProgress.modulesComplete.indexOf(module.moduleId) !== -1) {
        return true;
      }

      if (!courseProgress.subModulesComplete) return false;

      // All reading/exercise sub-modules must be complete
      var required = module.subModules.filter(function(sm) {
        return sm.type === 'reading' || sm.type === 'exercise';
      });

      if (required.length === 0) return true;

      for (var i = 0; i < required.length; i++) {
        if (courseProgress.subModulesComplete.indexOf(required[i].subModuleId) === -1) {
          return false;
        }
      }

      // Also check if the module quiz (if any) has been taken.
      // NOTE: We only check existence of quiz results, NOT `passed`.
      // Per learning-mode requirements, completing the quiz IS the
      // requirement — score is recorded for audit but does NOT gate
      // progress. The save chain in submitQuiz() always marks the
      // module complete regardless of score.
      if (module.quiz) {
        var quizResults = courseProgress.quizResults ? courseProgress.quizResults[module.moduleId] : null;
        if (!quizResults) return false;
      }

      return true;
    }

    /**
     * isModuleExpanded(module, moduleIndex)
     * Determines if a module group should be expanded in the sidebar.
     * Expands: the module containing the active sub-module, or the first
     * incomplete module, or the first module.
     *
     * @param {Object} module      - The module to check.
     * @param {number} moduleIndex - Its index.
     * @returns {boolean} True if the module should be expanded.
     */
    function isModuleExpanded(module, moduleIndex) {
      // If there's an active sub-module in this module, expand it
      if (activeSubModule) {
        var entry = allSubModules.find(function(sm) { return sm.subModuleId === activeSubModule; });
        if (entry && entry.moduleIndex === moduleIndex) return true;
      }

      // Auto-expand the first module by default
      if (moduleIndex === 0 && !activeSubModule) return true;

      return false;
    }

    /**
     * isModuleLocked(module, moduleIndex)
     * Determines if a module group as a whole is locked (previous module not done).
     *
     * @param {Object} module      - The module to check.
     * @param {number} moduleIndex - Its index.
     * @returns {boolean} True if the module is locked.
     */
    function isModuleLocked(module, moduleIndex) {
      if (moduleIndex === 0) return false;
      var prevModule = currentCourse.modules[moduleIndex - 1];
      if (!prevModule) return false;
      return !areAllSubModulesComplete(prevModule);
    }

    /**
     * getCurrentModule()
     * Returns the module object that contains the active sub-module.
     *
     * @returns {Object|null} The module object, or null.
     */
    function getCurrentModule() {
      if (!activeSubModule || !currentCourse) return null;
      var entry = allSubModules.find(function(sm) { return sm.subModuleId === activeSubModule; });
      if (!entry) return null;
      return currentCourse.modules[entry.moduleIndex];
    }

    /**
     * getCurrentSubModule()
     * Returns the data of the currently active sub-module.
     *
     * @returns {Object|null} The sub-module data, or null if none active.
     */
    function getCurrentSubModule() {
      if (!activeSubModule || !allSubModules) return null;
      var entry = allSubModules.find(function(sm) { return sm.subModuleId === activeSubModule; });
      return entry ? entry.data : null;
    }

    /**
     * getCurrentModuleId()
     * Returns the moduleId of the module containing the active sub-module.
     *
     * @returns {string|null} e.g. 'mod-1', or null.
     */
    function getCurrentModuleId() {
      var mod = getCurrentModule();
      return mod ? mod.moduleId : null;
    }

    /**
     * getModuleQuizPassingScore(module)
     * Returns the passing score percentage for a module's quiz.
     * Falls back to the course-level passing score, then to 80.
     *
     * @param {Object|null} module - The module object.
     * @returns {number} Passing percentage (e.g. 80).
     */
    function getModuleQuizPassingScore(module) {
      if (module && module.quiz && module.quiz.passingScore) return module.quiz.passingScore;
      if (currentCourse && currentCourse.passingScore) return currentCourse.passingScore;
      return 80;
    }


    // ── SECTION 9: CONTENT DATA LOADERS ───────────────────────────────────────

    /**
     * getCourseContent(courseId, subModuleId)
     * Returns the HTML content for a specific sub-module.
     * Reads from the COURSE_CONTENT data structure if available.
     * Returns null if no content has been written yet.
     *
     * The COURSE_CONTENT object is defined in data/content.js and maps
     * courseId + subModuleId to HTML strings. This keeps content separate
     * from the viewer logic so content can be edited without touching code.
     *
     * @param {string} courseId    - The course ID.
     * @param {string} subModuleId - The sub-module ID.
     * @returns {string|null} HTML content, or null if not found.
     */
    function getCourseContent(courseId, subModuleId) {
      // Use the i18n localised content function (checks French content first)
      if (typeof getLocalizedContent === 'function') {
        return getLocalizedContent(courseId, subModuleId);
      }

      // Fallback: direct COURSE_CONTENT access
      if (typeof COURSE_CONTENT !== 'undefined' &&
          COURSE_CONTENT[courseId] &&
          COURSE_CONTENT[courseId][subModuleId]) {
        return COURSE_CONTENT[courseId][subModuleId];
      }
      return null;
    }

    /**
     * getQuizQuestions(courseId, moduleId)
     * Returns quiz questions for a given course module.
     * Checks the global QUIZ_QUESTIONS object first (for backward compat with
     * existing QA Onboarding quizzes), then checks course-specific quiz data.
     *
     * @param {string} courseId - The course ID.
     * @param {string} moduleId - The module ID. e.g. 'mod-1'
     * @returns {Array|null} Array of question objects, or null.
     */
    function getQuizQuestions(courseId, moduleId) {
      // If French is active, check for French quiz translations first
      if (typeof getLanguage === 'function' && getLanguage() === 'fr') {
        if (typeof LANG_QUIZZES_FR !== 'undefined' &&
            LANG_QUIZZES_FR[courseId] &&
            LANG_QUIZZES_FR[courseId][moduleId]) {
          return LANG_QUIZZES_FR[courseId][moduleId];
        }
      }

      // Check if these questions exist in course-specific quiz data
      if (typeof COURSE_QUIZZES !== 'undefined' &&
          COURSE_QUIZZES[courseId] &&
          COURSE_QUIZZES[courseId][moduleId]) {
        return COURSE_QUIZZES[courseId][moduleId];
      }

      // Check MODULE_QUIZ_MAP — maps new module IDs to legacy lesson quiz IDs
      // so migrated courses can use their existing quiz question banks
      if (typeof MODULE_QUIZ_MAP !== 'undefined' &&
          MODULE_QUIZ_MAP[courseId] &&
          MODULE_QUIZ_MAP[courseId][moduleId] &&
          typeof getQuestionsForLesson === 'function') {
        return getQuestionsForLesson(MODULE_QUIZ_MAP[courseId][moduleId]);
      }

      // Fall back to the legacy quiz store (used by QA Onboarding directly)
      if (typeof getQuestionsForLesson === 'function') {
        return getQuestionsForLesson(moduleId);
      }

      return null;
    }


    // ── SECTION 10: UTILITY FUNCTIONS ─────────────────────────────────────────

    /**
     * getTypeLabel(type)
     * Returns a short human-readable label for a sub-module type.
     *
     * @param {string} type - e.g. 'reading', 'quiz', 'exercise', 'final-exam'
     * @returns {string} Short label. e.g. 'Read', 'Quiz', 'Practice', 'Exam'
     */
    function getTypeLabel(type) {
      var labels = {
        'reading':    __('cv_read'),
        'quiz':       __('cv_quiz'),
        'exercise':   __('cv_practice'),
        'final-exam': __('cv_exam'),
      };
      return labels[type] || type;
    }

    /**
     * padZero(num)
     * Pads a number to 2 digits with leading zero.
     *
     * @param {number} num - The number to format.
     * @returns {string} e.g. '01', '09', '12'
     */
    function padZero(num) {
      return String(num).padStart(2, '0');
    }

    /**
     * escapeHtml(str)
     * Escapes HTML special characters. Used when rendering dynamic text
     * into innerHTML to prevent XSS.
     *
     * @param {string} str - The string to escape.
     * @returns {string} Escaped string safe for innerHTML.
     */
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * showError(message)
     * Shows an error message in the content panel when something goes wrong.
     *
     * @param {string} message - The error message.
     */
    function showError(message) {
      document.getElementById('cv-welcome').style.display = 'block';
      document.getElementById('cv-welcome').innerHTML =
        '<h2 style="color:var(--color-error);">⚠️ ' + __('cv_error_load') + '</h2>' +
        '<p>' + escapeHtml(message) + '</p>';
    }

    /**
     * goBackToPortal()
     * Returns the student to the course portal page.
     */
    function goBackToPortal() {
      window.location.href = 'portal.html';
    }

    // ── MESSAGE LISTENER: External module completion (from lab iframes) ────
    window.addEventListener('message', function(event) {
      var msg = event.data;
      if (!msg || !msg.type) return;

      if (msg.type === 'MARK_MODULE_COMPLETE') {
        // Record bypass flag so handleExternalModuleComplete can store it
        if (msg.bypassed) {
          window.__bypassPending = true;
        }
        handleExternalModuleComplete(msg.subModuleId);
      }

      // Capstone 1 finished — navigate to certificate with confetti animation
      if (msg.type === 'CAPSTONE_FINISHED') {
        var certUrl = 'certificate.html?confetti=true';
        if (msg.courseId) {
          certUrl += '&course=' + encodeURIComponent(msg.courseId);
        }
        window.location.href = certUrl;
      }
    });

  </script>
</body>
</html>
