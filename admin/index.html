<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Pilot Academy — Admin</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/main.css">

  <style>
    /* ── ADMIN LOGIN PAGE (INVERTED SPLIT-SCREEN) ────────────────────────── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      background: #ffffff;
      overflow: hidden;
    }

    /* ── LEFT FORM SECTION (LIGHT) ───────────────────────────────────────── */
    .login-form-section {
      width: 55%;
      padding: var(--space-10);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    @media (max-width: 1024px) {
      .login-form-section { width: 100%; }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      transition: all 0.3s ease;
    }

    .login-logo {
      display: flex;
      justify-content: flex-start;
      margin-bottom: var(--space-8);
    }

    .login-logo svg {
      width: 48px;
      height: 48px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 800;
      color: #1e3a8a;
      margin-bottom: var(--space-2);
      text-align: left;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: var(--space-8);
      text-align: left;
      font-weight: 500;
    }

    /* ── FORM ELEMENTS ───────────────────────────────────────────────────── */
    .login-card .form-group {
      margin-bottom: var(--space-6);
    }

    .login-card .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-card .form-control {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .login-card .form-control:focus {
      outline: none;
      border-color: #7c3aed;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .login-card .form-control::placeholder {
      color: #9ca3af;
    }

    .btn-login {
      width: 100%;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 700;
      margin-top: var(--space-6);
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
      background: linear-gradient(135deg, #6d28d9 0%, #5b21b6 100%);
    }

    .btn-login:active {
      transform: translateY(0px);
    }

    .login-error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      padding: 12px 14px;
      margin-bottom: var(--space-5);
      border-left: 4px solid #dc2626;
    }
    .login-error.visible { display: block; animation: slideIn 0.3s ease; }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-footer {
      text-align: left;
      margin-top: var(--space-10);
      padding-top: var(--space-6);
      border-top: 1px solid #e5e7eb;
      font-size: 12px;
    }
    .login-footer a {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    .login-footer a:hover {
      color: #6d28d9;
      text-decoration: underline;
    }

    /* ── RIGHT HERO SECTION (DARK INVERTED) ────────────────────────────── */
    .login-hero {
      width: 45%;
      padding: var(--space-12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1f2937 0%, #374151 50%, #4b5563 100%);
    }

    @media (max-width: 1024px) {
      .login-hero {
        display: none;
        width: 0;
      }
    }

    .login-hero::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
    }

    .login-hero-content {
      position: relative;
      z-index: 10;
      max-width: 380px;
      width: 100%;
      padding: 0 var(--space-6);
    }

    .login-hero-logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-8);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .login-hero-logo svg {
      width: 48px;
      height: 48px;
      opacity: 0.9;
    }

    .login-hero h2 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: var(--space-4);
      letter-spacing: -0.5px;
    }

    .login-hero-tagline {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 0;
      line-height: 1.4;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <!-- LEFT: FORM SECTION (LIGHT) -->
    <div class="login-form-section">
      <div class="login-card">

        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="10" fill="#7c3aed"/>
            <path d="M14 24 L20 30 L34 16" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="24" cy="24" r="10" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
          </svg>
        </div>

        <h1 class="login-title">Administrator Access</h1>
        <p class="login-subtitle">Enter the admin password to continue.</p>

        <div id="login-error" class="login-error" role="alert" aria-live="polite"></div>

        <form id="admin-login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="admin-password">
              Password <span class="required">*</span>
            </label>
            <input
              type="password"
              id="admin-password"
              name="admin-password"
              class="form-control"
              placeholder="Enter administrator password"
              autocomplete="current-password"
              required
            >
            <div id="admin-caps-warning" class="field-error" style="display:none;">Caps Lock is on.</div>
          </div>

          <button type="submit" class="btn btn-primary btn-login" id="login-btn">
            Sign in as Admin
          </button>
        </form>

        <div class="login-footer">
          <a href="../index.html">← Back to student sign in</a>
        </div>

      </div>
    </div>

    <!-- RIGHT: DARK HERO SECTION (INVERTED) -->
    <div class="login-hero">
      <div class="login-hero-content">
        <div class="login-hero-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="10" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
            <path d="M14 24 L20 30 L34 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
            <circle cx="24" cy="24" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.2"/>
          </svg>
        </div>

        <h2>Admin Dashboard</h2>
        <p class="login-hero-tagline">Manage students, track progress, and oversee all training activities.</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="../data/content.js"></script>
  <script src="../data/quiz-questions.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/app.js"></script>

  <script>
    /**
     * admin/index.html — Admin Login Page Logic
     * =========================================
     * WHAT THIS PAGE DOES:
     * - Authenticates the administrator via password against IndexedDB
     * - Falls back to a default password on first run before admin sets one
     * - Redirects to dashboard.html on successful login
     *
     * FLOW:
     * 1. initDB() establishes database connection
     * 2. Checks for existing admin session — redirects if found
     * 3. On form submit: getAdminPassword(), compare, set sessionStorage
     *
     * READS FROM:   IndexedDB via db.js (settings store for admin password)
     * WRITES TO:    sessionStorage (qa_admin flag)
     * REDIRECTS TO: dashboard.html on successful login
     */

    // ── SECTION 1: CONSTANTS & STATE ──────────────────────────────────────────

    // Fallback password used ONLY before the admin has set one via the dashboard.
    var DEFAULT_ADMIN_PASSWORD = 'QAAdmin2026';

    // ── SECTION 2: INITIALISE ─────────────────────────────────────────────────

    // Open the database, then check if an admin session already exists.
    // If already logged in, skip straight to the dashboard.
    initDB().then(function() {
      if (sessionStorage.getItem('qa_admin') === 'true') {
        window.location.href = 'dashboard.html';
      }
    }).catch(function(error) {
      console.error('Admin login: DB init failed.', error);
    });

    // ── SECTION 3: FORM SUBMISSION ───────────────────────────────────────────

    var form     = document.getElementById('admin-login-form');
    var loginBtn = document.getElementById('login-btn');

    /**
     * Handles the admin login form submission.
     * Validates the input, checks against the stored password
     * (or default fallback), and redirects to dashboard.html on success.
     */
    form.addEventListener('submit', function(event) {
      event.preventDefault();

      var entered = document.getElementById('admin-password').value;
      hideError();

      if (!entered) {
        showError('Please enter the admin password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      // Fetch the stored password — if none set yet, use the default.
      getAdminPassword().then(function(storedPassword) {
        if (storedPassword) {
          // A password has been set — verify against the stored hash.
          return verifyPassword(entered, storedPassword).then(function(matched) {
            if (matched) {
              sessionStorage.setItem('qa_admin', 'true');
              window.location.href = 'dashboard.html';
            } else {
              showError('Incorrect password. Please try again.');
              document.getElementById('admin-password').value = '';
              document.getElementById('admin-password').focus();
              loginBtn.disabled = false;
              loginBtn.textContent = 'Sign in as Admin';
            }
          });
        } else {
          // No password has been set yet — compare against the default directly.
          if (entered === DEFAULT_ADMIN_PASSWORD) {
            sessionStorage.setItem('qa_admin', 'true');
            window.location.href = 'dashboard.html';
          } else {
            showError('Incorrect password. Please try again.');
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-password').focus();
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign in as Admin';
          }
        }
      }).catch(function(error) {
        console.error('Failed to retrieve admin password:', error);
        showError('Database error. Please refresh and try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in as Admin';
      });
    });

    // ── SECTION 4: HELPERS ───────────────────────────────────────────────────

    /**
     * showError(message)
     * Displays the error banner with the given message.
     *
     * @param {string} message - The error text to show.
     */
    function showError(message) {
      var el = document.getElementById('login-error');
      el.textContent = message;
      el.classList.add('visible');
    }

    /**
     * hideError()
     * Hides the error banner. Called before each login attempt.
     */
    function hideError() {
      var el = document.getElementById('login-error');
      el.textContent = '';
      el.classList.remove('visible');
    }

    // ── CAPS LOCK DETECTION ──────────────────────────────────────────────────
    // Warns the user if Caps Lock is on while typing in the password field.
    // Uses getModifierState when available, with a fallback for older browsers.
    document.getElementById('admin-password').addEventListener('input', function(e) {
      const capsWarning = document.getElementById('admin-caps-warning');
      const isCapsLockOn = 
        (e.getModifierState && e.getModifierState('CapsLock')) || 
        (e.type === 'keypress' && 
         ((e.charCode >= 65 && e.charCode <= 90 && !e.shiftKey) || 
          (e.charCode >= 97 && e.charCode <= 122 && e.shiftKey)));
      
      capsWarning.style.display = isCapsLockOn ? 'block' : 'none';
    });

  </script>
  
</body>
</html>
