<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dialog-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .dialog-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .dialog-body {
            padding: 30px 25px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dialog-message {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .dialog-footer {
            padding: 0 25px 25px 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
        }

        .btn-ok {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-ok:active {
            transform: translateY(0);
        }

        .btn-cancel {
            background: #e8e8e8;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d8d8d8;
            transform: translateY(-2px);
        }

        .btn-cancel:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="dialog-container">
        <div class="dialog-header">Confirm</div>
        <div class="dialog-body">
            <div class="dialog-message" id="message">Are you sure?</div>
        </div>
        <div class="dialog-footer">
            <button class="btn-ok" id="okBtn">OK</button>
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
        </div>
    </div>

    <script>
        /**
         * Reusable Confirmation Dialog App
         *
         * URL Parameters:
         *   - message: The confirmation message to display
         *   - title: Dialog title (default: "Confirm")
         *   - okText: OK button label (default: "OK")
         *   - cancelText: Cancel button label (default: "Cancel")
         *
         * Returns via postMessage: { type: 'confirm-response', confirmed: boolean }
         *
         * Usage from parent window:
         *   const win = window.open('confirm.html?message=Are you sure?&okText=Yes&cancelText=No');
         *   window.addEventListener('message', (event) => {
         *       if (event.data.type === 'confirm-response') {
         *           if (event.data.confirmed) { /* user clicked OK */ }
         *           else { /* user clicked Cancel */ }
         *       }
         *   });
         */

        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const message = params.get('message') || 'Are you sure?';
        const title = params.get('title') || 'Confirm';
        const okText = params.get('okText') || 'OK';
        const cancelText = params.get('cancelText') || 'Cancel';

        // Update UI with parameters
        document.querySelector('.dialog-header').textContent = title;
        document.getElementById('message').textContent = message;
        document.getElementById('okBtn').textContent = okText;
        document.getElementById('cancelBtn').textContent = cancelText;

        // Send response and close
        function sendResponse(confirmed) {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'confirm-response',
                    confirmed: confirmed
                }, '*');
            }
            window.close();
        }

        // Button handlers
        document.getElementById('okBtn').addEventListener('click', () => {
            sendResponse(true);
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            sendResponse(false);
        });

        // Allow Enter/Escape keys
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                sendResponse(true);
            } else if (event.key === 'Escape') {
                sendResponse(false);
            }
        });

        // Auto-focus OK button for accessibility
        window.addEventListener('load', () => {
            document.getElementById('okBtn').focus();
        });
    </script>
</body>
</html>
